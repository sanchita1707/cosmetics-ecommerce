<!DOCTYPE html>
<html>
<head>
  <title>Sanique Shop 💄</title>
  <style>
    body { font-family: Arial; background:#fff0f5; text-align:center; }
    .products { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; padding:20px; }
    .card { background:white; padding:10px; border-radius:10px; box-shadow:0 0 10px #ccc; }
    img { width:100%; height:180px; object-fit:cover; }
    button { background:#e91e63; color:white; border:none; padding:8px; cursor:pointer; }
  </style>
</head>
<body>

<h1>💄 Sanique Products</h1>

<div class="products" id="productList"></div>

<script src="shop.js"></script>

</body>
</html>
